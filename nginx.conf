# Nginx config for the production container.
# Serves the SPA and reverse-proxies `/mermaid/` to the self-hosted
# `mermaid.ink` renderer (see docker-compose.yml). Sharing one origin keeps
# the diagram <img src> a clean relative URL like `/mermaid/img/<base64>`,
# which is what makes Confluence / Jira Cloud upload it on paste.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Bigger buffers — base64-encoded mermaid sources can produce long URLs.
    large_client_header_buffers 4 16k;

    # Proxy diagram rendering to the mermaid container.
    #
    # We accept two shapes for the path:
    #   /mermaid/img/<base64>
    #   /mermaid/img/<base64>/<friendly-name>.png
    #
    # The trailing `/<friendly-name>.png` is purely cosmetic — the SPA appends
    # it so Confluence / Jira (and "Save image as…") use a sensible filename
    # for the attachment instead of the opaque base64 blob. We strip it here
    # before forwarding upstream so the renderer sees just `/img/<base64>`.
    location ~ ^/mermaid/img/([A-Za-z0-9_-]+)(?:/[^/]+\.[A-Za-z0-9]+)?$ {
        rewrite ^/mermaid/img/([A-Za-z0-9_-]+)(?:/[^/]+\.[A-Za-z0-9]+)?$ /img/$1 break;
        proxy_pass http://mermaid:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=86400, immutable";
    }

    # Catch-all for any other /mermaid/* paths (e.g. /mermaid/svg/<b64>) —
    # passes straight through to the renderer.
    location /mermaid/ {
        proxy_pass http://mermaid:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=86400, immutable";
    }

    # SPA fallback — every unknown path returns index.html so client-side
    # routing (react-router) handles deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}


name: Deploy to Production

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/code-weaver:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/code-weaver:${{ github.ref_name }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            # Navigate to project directory
            cd /home/user/config/ai-utils
            
            # Update code
            # We use 'reset --hard' to ensure the local state matches origin exactly
            # This prevents merge conflicts if the server has local changes.
            git fetch --all
            git reset --hard origin/main
            
            # Pull latest image and restart containers
            docker compose pull
            docker compose up -d
            
            # Optional: Clean up unused images to save disk space
            docker image prune -f